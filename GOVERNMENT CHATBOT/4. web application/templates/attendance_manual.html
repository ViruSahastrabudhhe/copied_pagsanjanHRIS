<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Attendance Entry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .employee-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .employee-info {
            background: #e8f5ff;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }
        .employee-info h3 {
            color: #1e40af;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .employee-info p {
            color: #1e40af;
            font-size: 14px;
            margin: 5px 0;
        }
        .periods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .period-card {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
        }
        .period-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .period-card.am {
            border-color: #10b981;
        }
        .period-card.pm {
            border-color: #f59e0b;
        }
        .period-card.ot {
            border-color: #8b5cf6;
        }
        .period-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .period-icon {
            font-size: 32px;
        }
        .period-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        .period-time {
            font-size: 12px;
            color: #666;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-in {
            background: #10b981;
            color: white;
        }
        .btn-in:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
        }
        .btn-out {
            background: #ef4444;
            color: white;
        }
        .btn-out:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
        }
        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
            margin-top: 20px;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .time-display {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }
        .time-display strong {
            color: #333;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        .result.success {
            background: #c6f6d5;
            border: 2px solid #48bb78;
        }
        .result.error {
            background: #fed7d7;
            border: 2px solid #f56565;
        }
        .result h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }
        .current-status {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .current-status h4 {
            color: #856404;
            margin-bottom: 10px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 13px;
        }
        .status-item {
            background: white;
            padding: 8px;
            border-radius: 6px;
        }
        .status-item .label {
            color: #666;
            font-size: 11px;
        }
        .status-item .value {
            color: #333;
            font-weight: 600;
        }
        .status-item .value.recorded {
            color: #10b981;
        }
        .status-item .value.empty {
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Manual Attendance Entry</h1>
        <p class="subtitle">Select time period, then scan QR code</p>

        <div class="employee-section" id="periodSelection">
            <h3 style="margin-bottom: 20px; color: #333;">Step 1: Select Time Period</h3>
            <div class="button-group" style="grid-template-columns: repeat(3, 1fr); gap: 15px;">
                <button class="btn btn-in" onclick="selectPeriod('am_in')">🌅 AM In</button>
                <button class="btn btn-out" onclick="selectPeriod('am_out')">🌅 AM Out</button>
                <button class="btn btn-in" onclick="selectPeriod('pm_in')">☀️ PM In</button>
                <button class="btn btn-out" onclick="selectPeriod('pm_out')">☀️ PM Out</button>
                <button class="btn btn-in" onclick="selectPeriod('ot_in')">🌙 OT In</button>
                <button class="btn btn-out" onclick="selectPeriod('ot_out')">🌙 OT Out</button>
            </div>
        </div>

        <div class="employee-section" id="scannerSection" style="display: none;">
            <h3 style="margin-bottom: 15px; color: #333;">Step 2: Scan Employee QR Code</h3>
            <div style="background: #1e293b; padding: 20px; border-radius: 15px; text-align: center;">
                <video id="video" width="100%" style="max-width: 500px; border-radius: 10px; display: none;"></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div id="scanStatus" style="color: white; margin-top: 15px; font-size: 16px;">📷 Initializing camera...</div>
            </div>
            <button class="btn btn-primary" onclick="cancelScan()" style="background: #ef4444; margin-top: 15px;">
                ❌ Cancel
            </button>
        </div>

        <div class="employee-info" id="employeeInfo" style="display: none;">
            <h3 id="employeeName"></h3>
            <p><strong>Employee ID:</strong> <span id="employeeId"></span></p>
            <p><strong>Position:</strong> <span id="employeePosition"></span></p>
            <p><strong>Recording:</strong> <span id="recordingPeriod" style="font-weight: bold; color: #667eea;"></span></p>
        </div>



        <div id="result" class="result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        let selectedPeriod = null;
        let video = null;
        let canvas = null;
        let canvasContext = null;
        let scanning = false;
        let stream = null;
        let processing = false;
        let lastScanTime = 0;
        const COOLDOWN_MS = 5000; // 5 seconds cooldown

        function selectPeriod(period) {
            selectedPeriod = period;
            const periodNames = {
                'am_in': 'AM Time In',
                'am_out': 'AM Time Out',
                'pm_in': 'PM Time In',
                'pm_out': 'PM Time Out',
                'ot_in': 'OT Time In',
                'ot_out': 'OT Time Out'
            };
            document.getElementById('recordingPeriod').textContent = periodNames[period];
            document.getElementById('periodSelection').style.display = 'none';
            document.getElementById('scannerSection').style.display = 'block';
            startCamera();
        }

        async function startCamera() {
            video = document.getElementById('video');
            canvas = document.getElementById('canvas');
            canvasContext = canvas.getContext('2d');

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    video.style.display = 'block';
                    document.getElementById('scanStatus').textContent = '📷 Ready! Point camera at QR code...';
                    scanning = true;
                    requestAnimationFrame(scanQRCode);
                });
            } catch (error) {
                document.getElementById('scanStatus').textContent = '❌ Camera access denied';
                console.error('Camera error:', error);
            }
        }

        function scanQRCode() {
            if (!scanning || !video || video.videoWidth === 0 || processing) {
                if (scanning && !processing) requestAnimationFrame(scanQRCode);
                return;
            }
            
            // Check cooldown timer
            const now = Date.now();
            const timeSinceLastScan = now - lastScanTime;
            
            if (timeSinceLastScan < COOLDOWN_MS) {
                const remainingSeconds = Math.ceil((COOLDOWN_MS - timeSinceLastScan) / 1000);
                document.getElementById('scanStatus').textContent = `⏳ Please wait ${remainingSeconds} seconds...`;
                setTimeout(() => requestAnimationFrame(scanQRCode), 1000);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvasContext.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvasContext.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code) {
                processing = true;
                lastScanTime = now;
                document.getElementById('scanStatus').textContent = '✅ QR Code detected! Processing...';
                processQRCode(code.data);
            } else {
                requestAnimationFrame(scanQRCode);
            }
        }

        async function processQRCode(qrData) {
            try {
                const response = await fetch('/attendance/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        employee_id: qrData,
                        field: selectedPeriod
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showResult('success', `✅ ${data.message}`, data.time);
                    stopCamera();
                    setTimeout(() => {
                        resetToSelection();
                    }, 2000);
                } else {
                    showResult('error', `❌ ${data.message}`);
                    processing = false;
                    setTimeout(() => {
                        document.getElementById('scanStatus').textContent = '📷 Ready! Point camera at QR code...';
                        requestAnimationFrame(scanQRCode);
                    }, 2000);
                }
            } catch (error) {
                showResult('error', `❌ Error: ${error.message}`);
                processing = false;
                setTimeout(() => {
                    document.getElementById('scanStatus').textContent = '📷 Ready! Point camera at QR code...';
                    requestAnimationFrame(scanQRCode);
                }, 2000);
            }
        }

        function cancelScan() {
            stopCamera();
            resetToSelection();
        }

        function stopCamera() {
            scanning = false;
            processing = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (video) {
                video.srcObject = null;
                video.style.display = 'none';
            }
        }

        function resetToSelection() {
            selectedPeriod = null;
            processing = false;
            lastScanTime = 0;
            document.getElementById('periodSelection').style.display = 'block';
            document.getElementById('scannerSection').style.display = 'none';
            document.getElementById('employeeInfo').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('scanStatus').textContent = '📷 Initializing camera...';
        }

        function showResult(type, message, time) {
            const result = document.getElementById('result');
            result.className = `result ${type}`;
            result.style.display = 'block';

            if (time) {
                result.innerHTML = `<h2>${message}</h2><p>Time: ${time}</p>`;
            } else {
                result.innerHTML = `<h2>${message}</h2>`;
            }

            setTimeout(() => {
                result.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
